version: '3.8'

services:
  kong:
    image: kong:latest
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000" # Proxy API
      - "8001:8001" # Admin API
    volumes:
      - ./kong.yml:/opt/kong/kong.yml:ro

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: swagger-ui
    ports:
      # Expuesto en el 8081 para no generar conflicto con el puerto 8080 del microservicio Zonas-Espacios (Spring Boot)
      - "8081:8080"
    environment:
      URLS: '[{ "url": "http://localhost:8000/docs/usuarios", "name": "API Usuarios" }]'
